<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rankers</title>
<style>
  html, body { margin: 0; padding: 0; }
  #root { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel-source" id="app-source">
const { useState, useEffect, useCallback, useRef } = React;


// ---------- BOLD MODERN PALETTE ----------
const BG_GRAD = "linear-gradient(135deg, #0f2747 0%, #15498f 45%, #2196d8 100%)";
const ACCENT = "#22d3ee";
const RED = "#ff4d6d";
const RED_DARK = "#c81e44";
const GOLD = "#ffd166";
const INK = "#0c1424";
const GLASS = "rgba(255,255,255,0.08)";
const GLASS_BORDER = "rgba(255,255,255,0.18)";
const BLUE_LABEL = "#1577c7";

// ---------- SOUND ENGINE (WebAudio, no external assets) ----------
let _ctx = null;
function audioCtx() {
  if (!_ctx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    _ctx = new AC();
  }
  return _ctx;
}
function beep(freq, duration = 0.12, type = "sine", gainVal = 0.08, delay = 0) {
  try {
    const ctx = audioCtx();
    const t0 = ctx.currentTime + delay;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(gainVal, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  } catch (e) { /* audio unsupported - fail silently */ }
}
const SFX = {
  draw: () => beep(520, 0.08, "triangle", 0.05),
  play: () => { beep(660, 0.09, "sine", 0.09); beep(880, 0.1, "sine", 0.06, 0.06); },
  discard: () => beep(220, 0.12, "sawtooth", 0.05),
  powerup: () => { beep(700, 0.08, "square", 0.06); beep(950, 0.1, "square", 0.05, 0.07); beep(1200, 0.12, "square", 0.04, 0.14); },
  illegal: () => beep(140, 0.18, "square", 0.06),
  turn: () => beep(440, 0.07, "sine", 0.04),
  win: () => { [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.22, "sine", 0.09, i * 0.13)); },
};

// ---------- DECK CONSTRUCTION ----------
const POWERUP_TYPES = [
  { id: "DRAW2", name: "Draw 2", icon: "🎴", desc: "Draw 2 cards from the deck." },
  { id: "STEAL", name: "Peek & Take", icon: "👁️", desc: "Look at an opponent's hand and take 1 card of your choice." },
  { id: "TAKE", name: "Pyramid Grab", icon: "🪝", desc: "Take 1 card from the pyramid into your hand (can't strand a card above it without 2 supports)." },
];

function buildDeck() {
  const cards = [];
  let uid = 0;
  for (let rank = 8; rank >= 2; rank--) {
    const doubleCount = rank - 2;
    for (let i = 0; i < doubleCount; i++) cards.push({ id: `c${uid++}`, rank, arrow: "double" });
    cards.push({ id: `c${uid++}`, rank, arrow: "left" });
    cards.push({ id: `c${uid++}`, rank, arrow: "right" });
  }
  cards.push({ id: `c${uid++}`, rank: 1, arrow: "none" });
  POWERUP_TYPES.forEach((p) => {
    for (let i = 0; i < 4; i++) cards.push({ id: `c${uid++}`, rank: null, arrow: null, powerup: p.id });
  });
  return cards;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function rowLength(rank) { return rank; }

// ---------- CARD VISUAL ----------
function CardFace({ card, size = "normal", faceDown = false, dim = false, glow = false }) {
  const w = size === "small" ? 48 : size === "tiny" ? 40 : size === "normal" ? 72 : 84;
  const h = w * 1.42;
  if (faceDown) {
    return (
      <div style={{
        width: w, height: h, borderRadius: 10,
        background: "linear-gradient(150deg, #1d4d85, #0c2240)",
        border: `2px solid ${GLASS_BORDER}`,
        boxShadow: "0 3px 8px rgba(0,0,0,0.45)",
        display: "flex", alignItems: "center", justifyContent: "center",
        position: "relative", overflow: "hidden",
      }}>
        <div style={{ width: w * 0.5, height: w * 0.5, borderRadius: "50%", border: `2px solid ${ACCENT}55`, opacity: 0.6 }} />
      </div>
    );
  }
  const isPower = !!card.powerup;
  return (
    <div style={{
      width: w, height: h, borderRadius: 10,
      background: isPower ? "linear-gradient(155deg, #2a1854, #150b2e)" : "linear-gradient(165deg, #ffffff, #eef3fb)",
      border: isPower ? `2px solid ${GOLD}99` : "2px solid #ffffffcc",
      boxShadow: glow ? `0 0 16px 3px ${ACCENT}, 0 3px 8px rgba(0,0,0,0.4)` : "0 3px 8px rgba(0,0,0,0.4)",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: w < 50 ? 2 : 5,
      position: "relative", opacity: dim ? 0.45 : 1, flexShrink: 0,
      transition: "transform 0.15s ease, box-shadow 0.15s ease",
    }}>
      {!isPower ? (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
          <Arrows arrow={card.arrow} size={w} />
          <div style={{
            fontWeight: 900, fontSize: w * 0.5, color: card.rank === 1 ? RED_DARK : INK,
            lineHeight: 1, textShadow: card.rank === 1 ? `0 0 6px ${GOLD}88` : "none",
          }}>
            {card.rank === 1 ? "♛" : card.rank}
          </div>
          {card.rank === 1 && w >= 50 && (
            <div style={{ fontSize: w * 0.13, color: BLUE_LABEL, fontWeight: 700, marginTop: 2, letterSpacing: 1 }}>RANKER</div>
          )}
        </div>
      ) : (
        <div style={{ textAlign: "center", color: GOLD, fontWeight: 800 }}>
          <div style={{ fontSize: w * 0.32 }}>{POWERUP_TYPES.find((p) => p.id === card.powerup)?.icon}</div>
          {w >= 50 && <div style={{ fontSize: w * 0.14, marginTop: 2 }}>{POWERUP_TYPES.find((p) => p.id === card.powerup)?.name}</div>}
        </div>
      )}
    </div>
  );
}

function Arrows({ arrow, size }) {
  const arrowH = size * 0.32;
  const cardW = size;
  const cardH = size * 1.42;
  const angleDeg = Math.atan((cardW / 2) / cardH) * (180 / Math.PI);
  const mk = (rotate, key) => (
    <svg key={key} width={size * 0.22} height={arrowH} viewBox="0 0 20 40" style={{ transform: `rotate(${rotate}deg)` }}>
      <defs>
        <linearGradient id={`ag-${key}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#ff7a8c" />
          <stop offset="100%" stopColor={RED} />
        </linearGradient>
      </defs>
      <polygon points="10,0 18,16 13,16 13,40 7,40 7,16 2,16" fill={`url(#ag-${key})`} />
    </svg>
  );
  let content;
  if (arrow === "double") {
    content = <div style={{ display: "flex", gap: size * 0.08, justifyContent: "center" }}>{mk(-angleDeg, "l")}{mk(angleDeg, "r")}</div>;
  } else if (arrow === "left") {
    content = <div style={{ display: "flex", justifyContent: "center" }}>{mk(-angleDeg, "l")}</div>;
  } else if (arrow === "right") {
    content = <div style={{ display: "flex", justifyContent: "center" }}>{mk(angleDeg, "r")}</div>;
  } else {
    content = <div style={{ height: arrowH }} />;
  }
  return <div style={{ height: arrowH, display: "flex", alignItems: "flex-end" }}>{content}</div>;
}

// ---------- GAME LOGIC HELPERS ----------
function emptyPyramid() {
  const p = {};
  for (let r = 8; r >= 1; r--) p[r] = new Array(rowLength(r)).fill(null);
  return p;
}
function supportsRight(card) { return card && (card.arrow === "double" || card.arrow === "right"); }
function supportsLeft(card) { return card && (card.arrow === "double" || card.arrow === "left"); }
function playableSlots(pyramid, rank) {
  if (rank === 8) return pyramid[8].map((c, i) => (c === null ? i : -1)).filter((i) => i >= 0);
  const lower = pyramid[rank + 1];
  const upper = pyramid[rank];
  const slots = [];
  for (let i = 0; i < upper.length; i++) {
    if (upper[i] !== null) continue;
    const left = lower[i];
    const right = lower[i + 1];
    if (left && right && supportsRight(left) && supportsLeft(right)) slots.push(i);
  }
  return slots;
}
function canPlaceCardAt(card, rank, slotIndex) {
  const len = rowLength(rank);
  const rightmost = len - 1;
  const leftmost = 0;
  if (card.arrow === "left") return slotIndex === rightmost;
  if (card.arrow === "right") return slotIndex === leftmost;
  if (card.arrow === "double") return slotIndex !== leftmost && slotIndex !== rightmost;
  return true;
}
function legalPlacementsForCard(pyramid, card) {
  if (!card || card.powerup) return [];
  return playableSlots(pyramid, card.rank).filter((i) => canPlaceCardAt(card, card.rank, i));
}
function isRowComplete(pyramid, rank) { return pyramid[rank].every((c) => c !== null); }
function pyramidFlatCards(pyramid) {
  const out = [];
  for (let r = 8; r >= 1; r--) pyramid[r].forEach((c, i) => { if (c) out.push({ card: c, rank: r, idx: i }); });
  return out;
}
function canRemoveFromPyramid(pyramid, rank, idx) {
  if (rank === 1) return true;
  const upper = pyramid[rank - 1];
  if (!upper) return true;
  const affectedUpperIdx = [idx - 1, idx].filter((i) => i >= 0 && i < upper.length);
  for (const ui of affectedUpperIdx) if (upper[ui] !== null) return false;
  return true;
}

// ---------- AI DECISION ENGINE ----------
const AI_DEPTH = { easy: 1, medium: 2, hard: 4 };

function clonePyramidWithPlacement(pyramid, card, slotIdx) {
  const np = { ...pyramid, [card.rank]: [...pyramid[card.rank]] };
  np[card.rank][slotIdx] = card;
  return np;
}

function findBestPlaySequence(hand, pyramid, depth) {
  if (depth <= 0) return null;
  let best = null;
  for (const c of hand) {
    if (c.powerup) continue;
    const slots = legalPlacementsForCard(pyramid, c);
    for (const s of slots) {
      const newPyramid = clonePyramidWithPlacement(pyramid, c, s);
      const newHand = hand.filter((h) => h.id !== c.id);
      const future = depth > 1 ? findBestPlaySequence(newHand, newPyramid, depth - 1) : null;
      const immediateValue = c.rank === 1 ? 100 : 1 + (8 - c.rank) * 0.1;
      const score = immediateValue + (future ? future.score : 0);
      if (!best || score > best.score) best = { card: c, slot: s, score };
    }
  }
  return best;
}

function chooseDiscard(hand, difficulty, deck, discard) {
  const rankCards = hand.filter((c) => !c.powerup);
  if (rankCards.length === 0) return hand[0];
  if (difficulty === "easy") {
    return [...rankCards].sort((a, b) => b.rank - a.rank)[0];
  }
  if (difficulty === "medium") {
    const discardCounts = {};
    discard.forEach((c) => { if (c.rank) discardCounts[c.rank] = (discardCounts[c.rank] || 0) + 1; });
    return [...rankCards].sort((a, b) => (discardCounts[b.rank] || 0) - (discardCounts[a.rank] || 0) || (b.rank - a.rank))[0];
  }
  const remainingCounts = {};
  [...deck, ...discard].forEach((c) => { if (c.rank) remainingCounts[c.rank] = (remainingCounts[c.rank] || 0) + 1; });
  return [...rankCards].sort((a, b) => (remainingCounts[b.rank] || 0) - (remainingCounts[a.rank] || 0))[0];
}

function chooseGrabTarget(pyramid, difficulty) {
  const flat = pyramidFlatCards(pyramid).filter((f) => canRemoveFromPyramid(pyramid, f.rank, f.idx));
  if (flat.length === 0) return null;
  if (difficulty === "hard") return [...flat].sort((a, b) => a.rank - b.rank)[0];
  return flat[Math.floor(Math.random() * flat.length)];
}

const PLAYER_COLORS = ["#22d3ee", "#ff4d6d", "#34d399", "#c084fc"];

// ---------- MAIN APP ----------
function RankersGame() {
  const [screen, setScreen] = useState("setup");
  const [numPlayers, setNumPlayers] = useState(2);
  const [humanCount, setHumanCount] = useState(1);
  const [aiDifficulty, setAiDifficulty] = useState("medium");
  const [soundOn, setSoundOn] = useState(true);
  const [curtainEnabled, setCurtainEnabled] = useState(true);
  const [curtainOpen, setCurtainOpen] = useState(false);
  const [showNamesModal, setShowNamesModal] = useState(false);
  const [playerNames, setPlayerNames] = useState([]);
  const [spectatorRevealAll, setSpectatorRevealAll] = useState(true);

  const [deck, setDeck] = useState([]);
  const [discard, setDiscard] = useState([]);
  const [hands, setHands] = useState([]);
  const [pyramid, setPyramid] = useState(emptyPyramid());
  const [current, setCurrent] = useState(0);
  const [actionsLeft, setActionsLeft] = useState(3);
  const [log, setLog] = useState([]);
  const [winner, setWinner] = useState(null);
  const [powerupsRemoved, setPowerupsRemoved] = useState(false);
  const [selectedCard, setSelectedCard] = useState(null);
  const [stealTarget, setStealTarget] = useState(null);
  const [grabMode, setGrabMode] = useState(false);
  const [drewThisTurn, setDrewThisTurn] = useState(false);
  const [confirmLeave, setConfirmLeave] = useState(false);
  const logContainerRef = useRef(null);
  const stageOuterRef = useRef(null);
  const stageInnerRef = useRef(null);
  const [fitScale, setFitScale] = useState(1);

  const sfx = useCallback((fn) => { if (soundOn) fn(); }, [soundOn]);
  const addLog = useCallback((msg) => setLog((l) => [...l.slice(-40), msg]), []);

  useEffect(() => {
    if (logContainerRef.current) logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
  }, [log]);

  useEffect(() => {
    if (screen !== "game" && screen !== "over") return;
    function recalc() {
      const outer = stageOuterRef.current, inner = stageInnerRef.current;
      if (!outer || !inner) return;
      const prevTransform = inner.style.transform;
      inner.style.transform = "none";
      const neededH = inner.scrollHeight, neededW = inner.scrollWidth;
      inner.style.transform = prevTransform;
      const availH = outer.clientHeight, availW = outer.clientWidth;
      const scale = Math.min(1, availH / neededH, availW / neededW);
      setFitScale(scale > 0 && isFinite(scale) ? scale : 1);
    }
    // Delay first measurement so React has fully painted the game screen
    const t = setTimeout(recalc, 80);
    window.addEventListener("resize", recalc);
    return () => {
      clearTimeout(t);
      window.removeEventListener("resize", recalc);
    };
  }, [screen]);

  function nameFor(p) {
    return (playerNames[p] && playerNames[p].trim()) ? playerNames[p].trim() : `Player ${p + 1}`;
  }

  function openNamesModal() {
    if (humanCount === 0) {
      startGame();
      return;
    }
    setPlayerNames((prev) => {
      const arr = [];
      for (let i = 0; i < numPlayers; i++) arr.push(prev[i] || `Player ${i + 1}`);
      return arr;
    });
    setShowNamesModal(true);
  }

  function startGame() {
    let d = shuffle(buildDeck());
    const hs = [];
    for (let p = 0; p < numPlayers; p++) { hs.push(d.slice(0, 5)); d = d.slice(5); }
    setDeck(d); setHands(hs); setDiscard([]); setPyramid(emptyPyramid());
    setPowerupsRemoved(false); setWinner(null);
    setLog([`Game started with ${numPlayers} players (${humanCount} human).`]);
    let bestP = 0, bestRank = 99;
    hs.forEach((h, pi) => h.forEach((c) => { if (c.rank && c.rank < bestRank) { bestRank = c.rank; bestP = pi; } }));
    setCurrent(bestP); setActionsLeft(3); setDrewThisTurn(false); setScreen("game");
  }

  function isHuman(p) { return p < humanCount; }

  function drawUpTo5(playerIdx, hs, d, disc) {
    let newHand = [...hs[playerIdx]], newDeck = [...d], newDiscard = [...disc];
    while (newHand.length < 5) {
      if (newDeck.length === 0) {
        if (newDiscard.length === 0) break;
        newDeck = shuffle(newDiscard); newDiscard = []; addLog("Deck empty — reshuffled discard pile.");
      }
      newHand.push(newDeck.shift());
    }
    return { newHand, newDeck, newDiscard };
  }

  function startTurnDraw() {
    if (drewThisTurn) return;
    setHands((hs) => {
      const { newHand, newDeck, newDiscard } = drawUpTo5(current, hs, deck, discard);
      setDeck(newDeck); setDiscard(newDiscard);
      const copy = [...hs]; copy[current] = newHand; return copy;
    });
    sfx(SFX.draw);
    setDrewThisTurn(true);
  }

  useEffect(() => {
    if (screen === "game" && !winner) { setDrewThisTurn(false); sfx(SFX.turn); }
    if (screen === "game" && curtainEnabled && humanCount > 1 && current < humanCount) {
      setCurtainOpen(false);
    } else {
      setCurtainOpen(true);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [current, screen, winner]);

  useEffect(() => {
    if (screen === "game" && !winner && !drewThisTurn) startTurnDraw();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [drewThisTurn, screen, winner]);

  // Auto-advance when human finishes drawing but still has no cards and can't act
  useEffect(() => {
    if (screen !== "game" || winner) return;
    if (!drewThisTurn) return;          // wait until draw phase is done
    if (!isHuman(current)) return;      // AI handles its own empty-hand case
    if ((hands[current] || []).length > 0) return; // has cards, nothing to do
    addLog(`${nameFor(current)} has no cards and cannot act — turn passes automatically.`);
    const t = setTimeout(() => { setCurrent((c) => (c + 1) % numPlayers); setActionsLeft(3); }, 350);
    return () => clearTimeout(t);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [drewThisTurn, hands, current, screen, winner]);

  function endTurnCheck(newActionsLeft) {
    if (newActionsLeft <= 0) setTimeout(() => { setCurrent((c) => (c + 1) % numPlayers); setActionsLeft(3); }, 350);
    else setActionsLeft(newActionsLeft);
  }
  function endTurnOrPassIfEmpty(playerIdx, resultingHandLength, fallbackActionsLeft) {
    if (resultingHandLength === 0) {
      addLog(`Player ${playerIdx + 1} has no cards left — turn passes automatically.`);
      endTurnCheck(0);
    } else {
      endTurnCheck(fallbackActionsLeft);
    }
  }
  function checkRowFiveComplete(pyr) {
    if (!powerupsRemoved && isRowComplete(pyr, 5)) { setPowerupsRemoved(true); addLog("Rank 5 completed! Power-ups are now removed from the game when used."); }
  }
  function checkWin(pyr, playerIdx) {
    if (pyr[1][0] !== null) { setWinner(playerIdx); addLog(`🏆 Player ${playerIdx + 1} played the King Ranker and WINS!`); sfx(SFX.win); setScreen("over"); return true; }
    return false;
  }
  function playRankCard(playerIdx, card, slotIdx) {
    const legal = legalPlacementsForCard(pyramid, card);
    if (!legal.includes(slotIdx)) { addLog(`⚠️ Illegal placement blocked.`); sfx(SFX.illegal); return; }
    setPyramid((pyr) => {
      const np = { ...pyr, [card.rank]: [...pyr[card.rank]] };
      np[card.rank][slotIdx] = card;
      checkRowFiveComplete(np); checkWin(np, playerIdx);
      return np;
    });
    setHands((hs) => { const copy = [...hs]; copy[playerIdx] = copy[playerIdx].filter((c) => c.id !== card.id); return copy; });
    sfx(SFX.play);
    addLog(`Player ${playerIdx + 1} played Rank ${card.rank === 1 ? "King" : card.rank} card.`);
  }
  function discardCard(playerIdx, card) {
    setHands((hs) => { const copy = [...hs]; copy[playerIdx] = copy[playerIdx].filter((c) => c.id !== card.id); return copy; });
    setDiscard((d) => [...d, card]);
    sfx(SFX.discard);
    addLog(`Player ${playerIdx + 1} discarded a card.`);
  }
  function usePowerup(playerIdx, card, opts = {}) {
    const type = card.powerup;
    setHands((hs) => { const copy = [...hs]; copy[playerIdx] = copy[playerIdx].filter((c) => c.id !== card.id); return copy; });
    sfx(SFX.powerup);
    if (type === "DRAW2") {
      setDeck((d0) => {
        let d = [...d0], disc = [...discard], drawn = [];
        for (let i = 0; i < 2; i++) {
          if (d.length === 0) { if (disc.length === 0) break; d = shuffle(disc); disc = []; }
          drawn.push(d.shift());
        }
        setDiscard(disc);
        setHands((hs2) => { const copy = [...hs2]; copy[playerIdx] = [...copy[playerIdx], ...drawn]; return copy; });
        return d;
      });
      addLog(`Player ${playerIdx + 1} used Draw 2.`);
    } else if (type === "STEAL") {
      if (opts.stolenCard != null && opts.fromPlayer != null) {
        setHands((hs2) => {
          const copy = [...hs2];
          copy[opts.fromPlayer] = copy[opts.fromPlayer].filter((c) => c.id !== opts.stolenCard.id);
          copy[playerIdx] = [...copy[playerIdx], opts.stolenCard];
          return copy;
        });
        addLog(`Player ${playerIdx + 1} used Peek & Take on Player ${opts.fromPlayer + 1}.`);
      }
    } else if (type === "TAKE") {
      if (opts.takenRank != null && opts.takenIdx != null) {
        setPyramid((pyr) => {
          const np = { ...pyr, [opts.takenRank]: [...pyr[opts.takenRank]] };
          const taken = np[opts.takenRank][opts.takenIdx];
          np[opts.takenRank][opts.takenIdx] = null;
          if (taken) setHands((hs2) => { const copy = [...hs2]; copy[playerIdx] = [...copy[playerIdx], taken]; return copy; });
          return np;
        });
        addLog(`Player ${playerIdx + 1} used Pyramid Grab.`);
      }
    }
    if (!powerupsRemoved) setDiscard((d) => [...d, card]);
    else addLog(`(Power-up removed from game — rank 5 already completed.)`);
  }

  function humanPlayCard(card, slotIdx) {
    if (actionsLeft <= 0) return;
    const legal = legalPlacementsForCard(pyramid, card);
    if (!legal.includes(slotIdx)) { sfx(SFX.illegal); return; }
    const handLenBefore = (hands[current] || []).length;
    playRankCard(current, card, slotIdx); setSelectedCard(null);
    endTurnOrPassIfEmpty(current, handLenBefore - 1, actionsLeft - 1);
  }
  function humanDiscard(card) {
    if (actionsLeft <= 0) return;
    const handLenBefore = (hands[current] || []).length;
    discardCard(current, card); setSelectedCard(null);
    endTurnOrPassIfEmpty(current, handLenBefore - 1, actionsLeft - 1);
  }
  function humanUsePowerupSimple(card) {
    if (actionsLeft <= 0) return;
    if (card.powerup === "DRAW2") {
      usePowerup(current, card); setSelectedCard(null);
      endTurnCheck(actionsLeft - 1);
    } else if (card.powerup === "STEAL") setStealTarget({ card, choosingTargetPlayer: true });
    else if (card.powerup === "TAKE") setGrabMode({ card });
  }
  function chooseStealTargetPlayer(p) { setStealTarget({ card: stealTarget.card, fromPlayer: p, choosingTargetPlayer: false }); }
  function finishSteal(stolenCard) {
    usePowerup(current, stealTarget.card, { stolenCard, fromPlayer: stealTarget.fromPlayer });
    setStealTarget(null); setSelectedCard(null);
    endTurnCheck(actionsLeft - 1);
  }
  function finishGrab(rank, idx) {
    if (!canRemoveFromPyramid(pyramid, rank, idx)) return;
    usePowerup(current, grabMode.card, { takenRank: rank, takenIdx: idx });
    setGrabMode(false); setSelectedCard(null);
    endTurnCheck(actionsLeft - 1);
  }

  useEffect(() => {
    if (screen !== "game" || winner) return;
    if (isHuman(current)) return;
    if (!drewThisTurn) return;
    const timer = setTimeout(() => aiTakeAction(), 700);
    return () => clearTimeout(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [current, actionsLeft, drewThisTurn, screen, winner]);

  function aiTakeAction() {
    if (actionsLeft <= 0) return;
    const hand = hands[current];
    if (!hand) return;
    const depth = AI_DEPTH[aiDifficulty] || 1;

    const plan = findBestPlaySequence(hand, pyramid, depth);
    if (plan) {
      const handLenBefore = hand.length;
      playRankCard(current, plan.card, plan.slot);
      endTurnOrPassIfEmpty(current, handLenBefore - 1, actionsLeft - 1);
      return;
    }

    const powerCard = hand.find((c) => c.powerup);
    if (powerCard) {
      if (powerCard.powerup === "DRAW2") { usePowerup(current, powerCard); endTurnCheck(actionsLeft - 1); return; }
      else if (powerCard.powerup === "STEAL") {
        const others = [...Array(numPlayers).keys()].filter((p) => p !== current && hands[p].length > 0);
        if (others.length > 0) {
          const target = aiDifficulty === "hard"
            ? [...others].sort((a, b) => hands[b].length - hands[a].length)[0]
            : others[Math.floor(Math.random() * others.length)];
          const targetHand = hands[target];
          const stolen = aiDifficulty === "hard"
            ? [...targetHand].filter((c) => !c.powerup).sort((a, b) => a.rank - b.rank)[0] || targetHand[0]
            : targetHand[Math.floor(Math.random() * targetHand.length)];
          usePowerup(current, powerCard, { stolenCard: stolen, fromPlayer: target });
          endTurnCheck(actionsLeft - 1); return;
        }
      } else if (powerCard.powerup === "TAKE") {
        const pick = chooseGrabTarget(pyramid, aiDifficulty);
        if (pick) {
          usePowerup(current, powerCard, { takenRank: pick.rank, takenIdx: pick.idx });
          endTurnCheck(actionsLeft - 1); return;
        }
      }
      const handLenBefore = hand.length;
      discardCard(current, powerCard);
      endTurnOrPassIfEmpty(current, handLenBefore - 1, actionsLeft - 1);
      return;
    }

    const worst = chooseDiscard(hand, aiDifficulty, deck, discard);
    if (worst) {
      const handLenBefore = hand.length;
      discardCard(current, worst);
      endTurnOrPassIfEmpty(current, handLenBefore - 1, actionsLeft - 1);
    } else endTurnCheck(actionsLeft - 1);
  }

  // ---------- RENDER ----------
  if (screen === "setup") {
    return (
      <>
        <SetupScreen
          numPlayers={numPlayers} setNumPlayers={setNumPlayers}
          humanCount={humanCount} setHumanCount={setHumanCount}
          soundOn={soundOn} setSoundOn={setSoundOn}
          aiDifficulty={aiDifficulty} setAiDifficulty={setAiDifficulty}
          curtainEnabled={curtainEnabled} setCurtainEnabled={setCurtainEnabled}
          onStart={openNamesModal}
        />
        {showNamesModal && (
          <NamesModal
            humanCount={humanCount}
            playerNames={playerNames}
            setPlayerNames={setPlayerNames}
            onBack={() => setShowNamesModal(false)}
            onPlay={() => { setShowNamesModal(false); startGame(); }}
          />
        )}
      </>
    );
  }

  const human = isHuman(current);
  const hand = hands[current] || [];
  const legalForSelected = selectedCard ? legalPlacementsForCard(pyramid, selectedCard) : [];

  return (
    <>
    <div ref={stageOuterRef} style={{ height: "100vh", width: "100vw", overflow: "hidden", background: BG_GRAD, display: "flex", justifyContent: "center", alignItems: "flex-start" }}>
    <div ref={stageInnerRef} style={{ transform: `scale(${fitScale})`, transformOrigin: "top center", width: "100%", maxWidth: 760, boxSizing: "border-box", fontFamily: "'Segoe UI', system-ui, Arial, sans-serif", padding: 14, color: "white" }}>
      <style>{`
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 8px ${ACCENT}; } 50% { box-shadow: 0 0 20px ${ACCENT}; } }
        @keyframes pulseGold { 0%,100% { box-shadow: 0 0 14px 3px ${GOLD}; } 50% { box-shadow: 0 0 28px 6px ${GOLD}; } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.85) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .rk-card-anim { animation: popIn 0.18s ease; }
        .rk-fade { animation: slideUp 0.22s ease; }
        .rk-btn { transition: transform 0.12s ease, filter 0.12s ease; }
        .rk-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .rk-btn:active { transform: translateY(0); }
        .rk-slot { transition: box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 4px; }
      `}</style>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <h1 style={{ margin: 0, fontSize: 22, fontWeight: 900, letterSpacing: 0.5, color: GOLD }}>
          ♛ RANKERS
        </h1>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {humanCount === 0 && (
            <button className="rk-btn" style={iconBtn} onClick={() => setSpectatorRevealAll((s) => !s)} title="Toggle all-hands view">
              {spectatorRevealAll ? "🙈 Show only current" : "👁️ Show all hands"}
            </button>
          )}
          <button className="rk-btn" style={iconBtn} onClick={() => setSoundOn((s) => !s)} title="Toggle sound">
            {soundOn ? "🔊" : "🔇"}
          </button>
          <button className="rk-btn" style={btnLeave} onClick={() => setConfirmLeave(true)}>Leave Game</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
        {hands.map((h, p) => (
          <div key={p} className="rk-fade" style={{
            background: p === current ? "white" : GLASS,
            color: p === current ? PLAYER_COLORS[p] : "white",
            padding: "6px 14px", borderRadius: 20, fontWeight: 700, fontSize: 13,
            border: `2px solid ${PLAYER_COLORS[p]}`,
            backdropFilter: "blur(6px)",
            animation: p === current ? "pulseGlow 1.6s infinite" : "none",
          }}>
            P{p + 1}{isHuman(p) ? ` · ${nameFor(p)}` : " · AI"} · {h.length} 🂠
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 13, opacity: 0.85, flexWrap: "wrap" }}>
        <Stat label="Deck" value={deck.length} />
        <Stat label="Discard" value={discard.length} />
        <Stat label="Power-ups" value={powerupsRemoved ? "Removed" : "Active"} accent={powerupsRemoved ? RED : GOLD} />
        <Stat label="Actions left" value={actionsLeft} accent={ACCENT} bold />
      </div>

      {/* PYRAMID */}
      <div style={{
        marginTop: 10, background: GLASS, border: `1px solid ${GLASS_BORDER}`, backdropFilter: "blur(10px)",
        borderRadius: 16, padding: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
        boxShadow: "0 8px 30px rgba(0,0,0,0.25)",
      }}>
        {[1, 2, 3, 4, 5, 6, 7, 8].map((rank) => (
          <div key={rank} style={{ display: "flex", gap: 4, alignItems: "center" }}>
            <span style={{ width: 16, fontSize: 10, opacity: 0.7, fontWeight: 700 }}>{rank === 1 ? "♛" : rank}</span>
            {pyramid[rank].map((c, i) => {
              const playable = human && selectedCard && legalForSelected.includes(i) && selectedCard.rank === rank;
              const grabbable = grabMode && c && canRemoveFromPyramid(pyramid, rank, i);
              return (
                <div
                  key={i}
                  className="rk-slot"
                  onClick={() => {
                    if (human && playable) humanPlayCard(selectedCard, i);
                    else if (grabbable) finishGrab(rank, i);
                  }}
                  style={{
                    width: 38, height: 54, borderRadius: 7,
                    border: playable ? `2px solid ${ACCENT}` : grabbable ? `3px solid ${GOLD}` : "2px dashed rgba(255,255,255,0.22)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    cursor: (playable || grabbable) ? "pointer" : "default",
                    background: grabbable ? "rgba(255,209,102,0.22)" : c ? "transparent" : "rgba(255,255,255,0.04)",
                    boxShadow: playable ? `0 0 14px ${ACCENT}` : grabbable ? `0 0 22px 4px ${GOLD}` : "none",
                    animation: grabbable ? "pulseGold 1s infinite" : "none",
                  }}
                >
                  {c && <div className="rk-card-anim"><CardFace card={c} size="small" /></div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <div style={{ textAlign: "center", marginTop: 8, fontWeight: 700, color: GOLD, minHeight: 28, visibility: grabMode ? "visible" : "hidden" }}>
        Pyramid Grab: click a highlighted card to take it.{" "}
        {grabMode && <button className="rk-btn" onClick={() => { setGrabMode(false); setSelectedCard(null); }} style={btnSmall}>Cancel</button>}
      </div>

      {/* HAND(S) */}
      {human && curtainEnabled && humanCount > 1 && !curtainOpen ? (
        <div className="rk-fade" style={{
          marginTop: 14, background: GLASS, border: `1px solid ${GLASS_BORDER}`, backdropFilter: "blur(14px)",
          borderRadius: 16, padding: 24, textAlign: "center",
        }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>🂠</div>
          <h3 style={{ margin: "0 0 6px" }}>Pass the device to {nameFor(current)}</h3>
          <p style={{ fontSize: 13, opacity: 0.8, margin: "0 0 16px" }}>Make sure no one else can see the screen before revealing this hand.</p>
          <button className="rk-btn" style={{ ...btn, padding: "12px 22px", fontSize: 15 }} onClick={() => setCurtainOpen(true)}>
            I'm {nameFor(current)} — Reveal My Hand
          </button>
        </div>
      ) : humanCount === 0 && spectatorRevealAll ? (
        <div style={{ marginTop: 14 }}>
          <h3 style={{ margin: "4px 0", fontWeight: 800 }}>Spectating — All Hands Visible</h3>
          {hands.map((h, p) => (
            <div key={p} style={{ marginBottom: 14 }}>
              <div style={{
                display: "inline-block", marginBottom: 6, padding: "3px 10px", borderRadius: 14,
                fontSize: 12, fontWeight: 700, color: p === current ? PLAYER_COLORS[p] : "white",
                background: p === current ? "white" : GLASS, border: `2px solid ${PLAYER_COLORS[p]}`,
              }}>
                {nameFor(p)} {p === current ? "(current turn)" : ""}
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {h.map((c) => <CardFace key={c.id} card={c} size="small" dim={p !== current} />)}
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div style={{ marginTop: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 6 }}>
            <h3 style={{ margin: "4px 0", fontWeight: 800 }}>
              {human ? `Your Hand — ${nameFor(current)}` : humanCount === 0 ? `${nameFor(current)}'s Hand (current turn)` : `${nameFor(current)} is thinking…`}
            </h3>
            <span style={{ fontSize: 12, opacity: human ? 0.75 : 0, visibility: human ? "visible" : "hidden" }}>Tap a card, then tap a glowing pyramid slot / action.</span>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", minHeight: 100 }}>
            {(human || humanCount === 0) ? hand.map((c) => (
              <div
                key={c.id}
                className={human ? "rk-card-anim rk-btn" : "rk-card-anim"}
                onClick={() => human && setSelectedCard(selectedCard?.id === c.id ? null : c)}
                style={{ transform: selectedCard?.id === c.id ? "translateY(-12px)" : "none", cursor: human ? "pointer" : "default" }}
              >
                <CardFace card={c} glow={selectedCard?.id === c.id} />
              </div>
            )) : hand.map((c) => <CardFace key={c.id} card={c} faceDown />)}
          </div>
          <div className="rk-fade" style={{ marginTop: 10, minHeight: 76, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            {human && selectedCard && (
              <>
                {!selectedCard.powerup && (
                  legalForSelected.length > 0
                    ? <span style={{ fontSize: 13, color: ACCENT, fontWeight: 600 }}>Click a glowing pyramid slot to play this card →</span>
                    : <span style={{ fontSize: 13, color: RED }}>No legal spot for this card right now.</span>
                )}
                {selectedCard.powerup && (
                  <button className="rk-btn" style={btn} onClick={() => humanUsePowerupSimple(selectedCard)} disabled={actionsLeft <= 0}>
                    Use Power-up: {POWERUP_TYPES.find((p) => p.id === selectedCard.powerup)?.name}
                  </button>
                )}
                <button className="rk-btn" style={btn} onClick={() => humanDiscard(selectedCard)} disabled={actionsLeft <= 0}>Discard this card</button>
                <button className="rk-btn" style={btnSmall} onClick={() => { setSelectedCard(null); setGrabMode(false); }}>Cancel</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* LOG */}
      <div ref={logContainerRef} style={{ marginTop: 10, background: "rgba(0,0,0,0.3)", border: `1px solid ${GLASS_BORDER}`, borderRadius: 12, padding: 8, height: 90, overflowY: "auto", fontSize: 11.5 }}>
        {log.map((l, i) => <div key={i}>{l}</div>)}
      </div>
    </div>
    </div>

    {stealTarget && (
      <StealModal
        stealTarget={stealTarget} numPlayers={numPlayers} current={current} hands={hands}
        onChoosePlayer={chooseStealTargetPlayer} onChooseCard={finishSteal} onCancel={() => setStealTarget(null)}
      />
    )}

    {screen === "over" && winner != null && (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
        <div className="rk-fade" style={{ background: "linear-gradient(160deg, #fff, #eef3fb)", color: INK, borderRadius: 18, padding: 36, textAlign: "center", boxShadow: `0 0 40px ${GOLD}` }}>
          <div style={{ fontSize: 48 }}>♛</div>
          <h2 style={{ color: RED_DARK, margin: "8px 0" }}>{nameFor(winner)} is the King Ranker!</h2>
          <button className="rk-btn" style={btn} onClick={() => setScreen("setup")}>Play Again</button>
        </div>
      </div>
    )}

    {confirmLeave && (
      <Modal title="Leave this game?" onCancel={() => setConfirmLeave(false)}>
        <p style={{ textAlign: "center", margin: "8px 0 16px" }}>Are you sure you want to leave? The current game and pyramid progress will be lost.</p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <button className="rk-btn" style={{ ...btn, background: RED_DARK }} onClick={() => { setConfirmLeave(false); setScreen("setup"); }}>Yes, leave game</button>
          <button className="rk-btn" style={btnAlt} onClick={() => setConfirmLeave(false)}>Keep playing</button>
        </div>
      </Modal>
    )}
    </>
  );
}

function Stat({ label, value, accent, bold }) {
  return (
    <div style={{ display: "flex", gap: 5, alignItems: "baseline" }}>
      <span style={{ opacity: 0.65 }}>{label}:</span>
      <span style={{ color: accent || "white", fontWeight: bold ? 800 : 600 }}>{value}</span>
    </div>
  );
}

function StealModal({ stealTarget, numPlayers, current, hands, onChoosePlayer, onChooseCard, onCancel }) {
  if (stealTarget.choosingTargetPlayer) {
    const others = [...Array(numPlayers).keys()].filter((p) => p !== current && hands[p].length > 0);
    return (
      <Modal onCancel={onCancel} title="Peek & Take: choose a player">
        {others.length > 0 ? (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
            {others.map((p) => <button key={p} className="rk-btn" style={btn} onClick={() => onChoosePlayer(p)}>Player {p + 1} ({hands[p].length} cards)</button>)}
          </div>
        ) : (
          <p style={{ textAlign: "center" }}>No opponents have any cards to take right now.</p>
        )}
      </Modal>
    );
  }
  const targetHand = hands[stealTarget.fromPlayer];
  return (
    <Modal title={`Choose a card from Player ${stealTarget.fromPlayer + 1}'s hand`}>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
        {targetHand.map((c) => (
          <div key={c.id} onClick={() => onChooseCard(c)} style={{ cursor: "pointer" }}>
            <CardFace card={c} size="small" />
          </div>
        ))}
      </div>
    </Modal>
  );
}

function Modal({ title, children, onCancel }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}>
      <div className="rk-fade" style={{ background: "white", color: INK, borderRadius: 16, padding: 26, maxWidth: 480, boxShadow: "0 10px 40px rgba(0,0,0,0.4)" }}>
        <h3 style={{ marginTop: 0 }}>{title}</h3>
        {children}
        {onCancel && (
          <div style={{ textAlign: "center", marginTop: 16 }}>
            <button className="rk-btn" style={btnSmall} onClick={onCancel}>Cancel</button>
          </div>
        )}
      </div>
    </div>
  );
}

function NamesModal({ humanCount, playerNames, setPlayerNames, onBack, onPlay }) {
  const defaultNames = [...Array(humanCount).keys()].map((i) => `Player ${i + 1}`);
  const anyChanged = [...Array(humanCount).keys()].some((i) => (playerNames[i] || "").trim() && playerNames[i].trim() !== defaultNames[i]);

  function updateName(i, value) {
    setPlayerNames((prev) => {
      const copy = [...prev];
      copy[i] = value;
      return copy;
    });
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 70, padding: 16 }}>
      <div style={{ background: "white", color: INK, borderRadius: 18, padding: 28, maxWidth: 420, width: "100%", boxShadow: "0 12px 40px rgba(0,0,0,0.45)" }}>
        <h3 style={{ marginTop: 0, color: BLUE_LABEL }}>Enter Player Names</h3>
        <p style={{ fontSize: 13, color: "#555", marginTop: -4 }}>Optional — leave blank to keep the default name.</p>
        {humanCount === 0 ? (
          <p style={{ fontSize: 13, color: "#777" }}>No human players in this game — nothing to name.</p>
        ) : (
          [...Array(humanCount).keys()].map((i) => (
            <div key={i} style={{ marginBottom: 10 }}>
              <label style={{ ...lbl, marginBottom: 4 }}>Human Player {i + 1}</label>
              <input
                type="text"
                value={playerNames[i] || ""}
                onChange={(e) => updateName(i, e.target.value)}
                placeholder={defaultNames[i]}
                maxLength={16}
                style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #cfd6e0", fontSize: 14, boxSizing: "border-box" }}
              />
            </div>
          ))
        )}
        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 18 }}>
          <button className="rk-btn2" style={btnAlt} onClick={onBack}>Back to Title</button>
          <button className="rk-btn2" style={btn} onClick={onPlay}>
            {anyChanged ? "Play Rankers" : "Skip Names"}
          </button>
        </div>
      </div>
    </div>
  );
}

function SetupScreen({ numPlayers, setNumPlayers, humanCount, setHumanCount, soundOn, setSoundOn, aiDifficulty, setAiDifficulty, curtainEnabled, setCurtainEnabled, onStart }) {
  return (
    <div style={{ minHeight: "100vh", background: BG_GRAD, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Segoe UI', system-ui, Arial, sans-serif", color: "white", padding: 16 }}>
      <style>{`
        @keyframes floatCard { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
        .rk-float { animation: floatCard 3s ease-in-out infinite; }
        .rk-btn2 { transition: transform 0.12s ease, filter 0.12s ease; }
        .rk-btn2:hover { transform: translateY(-2px); filter: brightness(1.08); }
      `}</style>
      <div style={{
        background: "rgba(255,255,255,0.97)", color: INK, borderRadius: 22, padding: 36, maxWidth: 440, width: "100%",
        boxShadow: "0 20px 60px rgba(0,0,0,0.45)", border: `1px solid ${GLASS_BORDER}`,
      }}>
        <div className="rk-float" style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}>
          <CardFace card={{ rank: 1, arrow: "none" }} size="normal" />
        </div>
        <h1 style={{
          textAlign: "center", margin: "8px 0 2px", fontWeight: 900, fontSize: 32,
          background: `linear-gradient(90deg, ${BLUE_LABEL}, ${RED_DARK})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}>RANKERS</h1>
        <p style={{ textAlign: "center", color: RED_DARK, fontWeight: 700, marginTop: 0 }}>Claim the crown. Become King Ranker.</p>

        <label style={lbl}>Total Players (2–4)</label>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {[2, 3, 4].map((n) => (
            <button key={n} className="rk-btn2" style={numPlayers === n ? btn : btnAlt} onClick={() => { setNumPlayers(n); if (humanCount > n) setHumanCount(n); }}>{n}</button>
          ))}
        </div>

        <label style={lbl}>Human Players (rest are AI)</label>
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          {[...Array(numPlayers).keys()].map((i) => i + 1).map((n) => (
            <button key={n} className="rk-btn2" style={humanCount === n ? btn : btnAlt} onClick={() => setHumanCount(n)}>{n}</button>
          ))}
          <button className="rk-btn2" style={humanCount === 0 ? btn : btnAlt} onClick={() => setHumanCount(0)}>0 (watch AI)</button>
        </div>

        <label style={lbl}>Sound Effects</label>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <button className="rk-btn2" style={soundOn ? btn : btnAlt} onClick={() => setSoundOn(true)}>🔊 On</button>
          <button className="rk-btn2" style={!soundOn ? btn : btnAlt} onClick={() => setSoundOn(false)}>🔇 Off</button>
        </div>

        {humanCount > 1 && (
          <>
            <label style={lbl}>Pass-and-Play Curtain</label>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <button className="rk-btn2" style={curtainEnabled ? btn : btnAlt} onClick={() => setCurtainEnabled(true)}>🪟 On</button>
              <button className="rk-btn2" style={!curtainEnabled ? btn : btnAlt} onClick={() => setCurtainEnabled(false)}>Off</button>
            </div>
            <div style={{ fontSize: 11.5, color: "#555", marginBottom: 14, lineHeight: 1.4 }}>
              When on, each human player's hand is hidden behind a "pass the device" screen until they tap to reveal it on their own turn.
            </div>
          </>
        )}

        {humanCount < numPlayers && (
          <>
            <label style={lbl}>AI Difficulty</label>
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              {[
                { id: "easy", label: "Easy" },
                { id: "medium", label: "Medium" },
                { id: "hard", label: "Hard" },
              ].map((d) => (
                <button key={d.id} className="rk-btn2" style={aiDifficulty === d.id ? btn : btnAlt} onClick={() => setAiDifficulty(d.id)}>{d.label}</button>
              ))}
            </div>
            <div style={{ fontSize: 11.5, color: "#555", marginBottom: 22, lineHeight: 1.4 }}>
              {aiDifficulty === "easy" && "Easy: only considers its current move, no knowledge of the deck or discard pile."}
              {aiDifficulty === "medium" && "Medium: plans 2 moves ahead and has limited knowledge — it can see the discard pile."}
              {aiDifficulty === "hard" && "Hard: plans 4 moves ahead and has full knowledge of the deck and discard pile contents."}
            </div>
          </>
        )}

        <button className="rk-btn2" style={{ ...btn, width: "100%", padding: "14px", fontSize: 17 }} onClick={onStart}>
          Start Game
        </button>

        <div style={{ marginTop: 20, fontSize: 12, color: "#555" }}>
          <b>Quick rules:</b> Build the pyramid from Rank 8 up to King Ranker (Rank 1). Each turn: draw to 5, then take 3 actions (play a rank card, use a power-up, or discard). Be the one to play the King Ranker to win!
        </div>
      </div>
    </div>
  );
}

const btn = { background: `linear-gradient(135deg, ${ACCENT}, #1577c7)`, color: "white", border: "none", borderRadius: 10, padding: "9px 16px", fontWeight: 700, cursor: "pointer", fontSize: 14, boxShadow: "0 3px 10px rgba(34,211,238,0.35)" };
const btnAlt = { background: "#eef1f5", color: INK, border: `2px solid ${BLUE_LABEL}`, borderRadius: 10, padding: "9px 16px", fontWeight: 700, cursor: "pointer", fontSize: 14 };
const btnSmall = { background: "#dfe4ea", color: INK, border: "none", borderRadius: 8, padding: "5px 12px", fontWeight: 600, cursor: "pointer", fontSize: 12 };
const btnLeave = { background: `linear-gradient(135deg, ${RED}, ${RED_DARK})`, color: "white", border: "none", borderRadius: 10, padding: "7px 16px", fontWeight: 700, cursor: "pointer", fontSize: 13, boxShadow: "0 3px 10px rgba(255,77,109,0.35)" };
const iconBtn = { background: GLASS, color: "white", border: `1px solid ${GLASS_BORDER}`, borderRadius: 10, padding: "7px 11px", cursor: "pointer", fontSize: 15 };
const lbl = { display: "block", fontWeight: 700, fontSize: 13, color: BLUE_LABEL, marginBottom: 6 };

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RankersGame />);
</script>
